<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Soal Algoritma & Struktur Data — Edisi Lengkap (UAS)</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--text:#e2e8f0;--muted:#94a3b8;--code:#0b1220;--border:#334155;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}
  header{background:linear-gradient(135deg,#0ea5e9,#6366f1);padding:48px 20px;text-align:center;color:#fff;}
  header h1{margin:0 0 8px;font-size:1.9rem;}
  header p{margin:0;opacity:.92;}
  main{max-width:860px;margin:0 auto;padding:24px 18px 70px;}
  #content h2{color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px;margin-top:38px;}
  #content h1{display:none;}
  #content blockquote{border-left:4px solid var(--accent);margin:16px 0;padding:6px 16px;background:#1e293b;border-radius:0 8px 8px 0;color:var(--muted);}
  #content p{margin:12px 0;}
  pre{background:var(--code);padding:12px 14px;border-radius:8px;overflow:auto;font-size:.86rem;border:1px solid var(--border);}
  code{font-family:'SFMono-Regular',Consolas,Menlo,monospace;}
  :not(pre)>code{background:#0b1220;padding:1px 6px;border-radius:5px;color:#7dd3fc;}
  details{background:#0b1220;border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin:8px 0 18px;}
  details summary{cursor:pointer;font-weight:600;color:var(--accent);}
  details[open] summary{margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.9rem;}
  th,td{border:1px solid var(--border);padding:6px 10px;text-align:center;}
  th{background:var(--border);}
  hr{border:none;border-top:1px solid var(--border);margin:26px 0;}
  ol,ul{padding-left:22px;}
  a{color:var(--accent);}
  #loading{text-align:center;color:var(--muted);padding:40px;}
  footer{text-align:center;color:var(--muted);font-size:.85rem;padding:20px;}
</style>
</head>
<body>
<header>
  <h1>Latihan Soal Algoritma &amp; Struktur Data</h1>
  <p>Edisi Lengkap · Persiapan UAS · 12 topik, soal bertahap + pembahasan</p>
</header>
<main>
  <div id="loading">Memuat latihan soal…</div>
  <div id="content"></div>
</main>
<footer>Materi belajar mandiri — UAS Algoritma &amp; Struktur Data · ariftronics</footer>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const MD_URL = "https://raw.githubusercontent.com/ariftronics/latihan-soal-asd/main/latihan-soal-asd.md";
  fetch(MD_URL)
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(function(md){
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').innerHTML = marked.parse(md);
    })
    .catch(function(e){
      document.getElementById('loading').innerHTML =
        'Gagal memuat konten (' + e.message + '). Coba buka file <a href="latihan-soal-asd.md">latihan-soal-asd.md</a> langsung.';
    });
</script>
</body>
</html>
