<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Algoritma & Struktur Data</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;margin:0;background:#f1f5f9;color:#1e293b;line-height:1.6}
header{background:linear-gradient(135deg,#6366f1,#0ea5e9);color:#fff;padding:30px 16px;text-align:center}
header h1{margin:0;font-size:1.45rem}
header p{margin:6px 0 0;opacity:.92;font-size:.9rem}
.container{max-width:760px;margin:0 auto;padding:20px 16px 70px}
.card{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(15,23,42,.08);padding:22px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
h2{margin:0 0 6px;font-size:1.2rem}
.sub{color:#64748b;font-size:.9rem;margin:0 0 8px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
.topic-btn{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 12px;cursor:pointer;font-size:.92rem;font-weight:600;color:#334155;transition:.2s;text-align:center}
.topic-btn:hover{border-color:#6366f1;transform:translateY(-2px);box-shadow:0 6px 14px rgba(99,102,241,.15)}
.topic-btn small{display:block;font-weight:500;color:#94a3b8;margin-top:4px}
.topic-btn.all{grid-column:1/-1;background:linear-gradient(135deg,#6366f1,#0ea5e9);color:#fff;border:none}
.topic-btn.all small{color:#e0e7ff}
.meta{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:#64748b;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.meta .score{font-weight:700;color:#6366f1}
.badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px}
.b-Dasar{background:#dcfce7;color:#166534}.b-Menengah{background:#fef9c3;color:#854d0e}.b-Lanjut{background:#fee2e2;color:#991b1b}
.progress{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-bottom:16px}
.progress>div{height:100%;width:0;background:linear-gradient(90deg,#6366f1,#0ea5e9);transition:width .3s}
.qtext{font-size:1.05rem;font-weight:600;margin:6px 0 14px}
pre{background:#282c34;color:#e2e8f0;padding:0;border-radius:10px;overflow:auto;margin:0 0 14px}
pre code{font-family:Consolas,Menlo,monospace;font-size:.85rem;display:block;padding:14px}
.opt{display:flex;align-items:flex-start;width:100%;text-align:left;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:10px;cursor:pointer;font-size:.95rem;transition:.15s;color:#1e293b}
.opt:hover:not(:disabled){border-color:#6366f1;background:#eef2ff}
.opt:disabled{cursor:default}
.opt .key{font-weight:700;margin-right:10px;color:#6366f1}
.opt.correct{background:#dcfce7;border-color:#22c55e;color:#166534}
.opt.correct .key{color:#16a34a}
.opt.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.opt.wrong .key{color:#dc2626}
.explain{background:#eff6ff;border-left:4px solid #3b82f6;border-radius:0 10px 10px 0;padding:12px 14px;margin-top:8px;font-size:.92rem;animation:fade .3s}
.explain b{color:#1e40af}
.btn{display:inline-block;background:#6366f1;color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s;margin-top:10px}
.btn:hover{background:#4f46e5}
.btn.secondary{background:#e2e8f0;color:#334155}
.btn.secondary:hover{background:#cbd5e1}
.result-score{font-size:2.4rem;font-weight:800;text-align:center;margin:8px 0 0}
.result-pct{text-align:center;color:#64748b;margin-bottom:10px}
.breakdown{width:100%;border-collapse:collapse;margin:14px 0}
.breakdown th,.breakdown td{border:1px solid #e2e8f0;padding:8px 10px;text-align:center;font-size:.9rem}
.breakdown th{background:#f1f5f9}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.hidden{display:none}
@media(max-width:520px){.qtext{font-size:1rem}.result-score{font-size:2rem}}
</style>
</head>

var QUESTIONS=[
{t:'bigo',l:'Dasar',q:'Notasi yang menyatakan batas atas (upper bound) pertumbuhan waktu eksekusi algoritma adalah?',c:'',o:['Big-O','Big-Omega','Big-Theta','Little-omega'],a:0,e:'Big-O menyatakan batas atas (worst case). Big-Omega batas bawah, Big-Theta batas ketat, little-omega batas bawah tidak ketat.'},

{t:'bigo',l:'Lanjut',q:'Dengan Master Theorem, solusi rekurens T(n) = 2T(n/2) + n adalah?',c:'',o:['O(n log n)','O(n)','O(n^2)','O(log n)'],a:0,e:'n^(log_b a)=n dan f(n)=n sebanding (Case 2) => O(n log n) - persis Merge Sort.'},

{t:'bigo',l:'Menengah',q:'Berapa kompleksitas dua loop yang BERURUTAN (bukan bersarang)?',c:'for (i=0;i<n;i++) a();\nfor (j=0;j<n;j++) b();',o:['O(n^2)','O(n)','O(log n)','O(2^n)'],a:1,e:'Loop berurutan dijumlahkan: O(n)+O(n)=O(n). Dikalikan hanya jika bersarang.'},
{t:'bigo',l:'Menengah',q:'Berapa kompleksitas loop segitiga berikut?',c:'for (i=0;i<n;i++)\n  for (j=0;j<=i;j++)\n    op();',o:['O(n log n)','O(n)','O(n^2)','O(log n)'],a:2,e:'Total iterasi 1+2+...+n = n(n+1)/2 => O(n^2).'},

{t:'array',l:'Dasar',q:'Ciri utama array statis adalah?',c:'',o:['Ukuran tetap saat dideklarasikan','Ukuran bertambah otomatis','Elemen boleh beda tipe','Elemen tersebar acak'],a:0,e:'Array statis berukuran tetap dan elemennya kontigu di memori.'},
{t:'array',l:'Dasar',q:'Pada kebanyakan bahasa (C, Java), indeks pertama array adalah?',c:'',o:['0','1','-1','Tergantung panjang'],a:0,e:'Indeks berbasis 0 sehingga elemen pertama A[0].'},
{t:'array',l:'Menengah',q:'Array int (4 byte) beralamat awal 1000. Berapa alamat A[5]?',c:'',o:['1020','1005','1024','1040'],a:0,e:'alamat = base + index*size = 1000 + 5*4 = 1020.'},

{t:'array',l:'Lanjut',q:'Memutar array sejauh k dengan O(n) waktu dan O(1) memori memakai?',c:'',o:['Tiga kali operasi reverse','Array bantu berukuran n','Sorting ulang','Rekursi penuh'],a:0,e:'Teknik 3x reverse memutar array dengan O(n) waktu dan O(1) memori.'},

{t:'array',l:'Dasar',q:'Array 2D m baris x n kolom butuh ruang sebesar?',c:'',o:['O(m + n)','O(m * n)','O(n^2)','O(m)'],a:1,e:'Total m*n sel disimpan => O(m*n).'},

{t:'array',l:'Lanjut',q:'Mengapa append dynamic array disebut O(1) amortized meski sesekali resize?',c:'',o:['Resize O(n) jarang terjadi dan biayanya tersebar','Resize tak pernah terjadi','Array tak pernah penuh','Elemen tak disalin'],a:0,e:'Kapasitas digandakan saat penuh; penyalinan O(n) jarang sehingga rata-rata per append O(1).'},

{t:'stackqueue',l:'Lanjut',q:'Queue dengan dua Stack memberi kompleksitas dequeue?',c:'',o:['O(1) amortized','O(n) selalu','O(log n)','O(n^2)'],a:0,e:'Tiap elemen dipindah paling banyak sekali => rata-rata O(1) amortized.'},
{t:'stackqueue',l:'Dasar',q:'Operasi menambah elemen ke atas Stack disebut?',c:'',o:['enqueue','push','insert','append'],a:1,e:'Menambah ke Stack = push; mengambil = pop. enqueue adalah operasi Queue.'},
{t:'stackqueue',l:'Dasar',q:'Operasi melihat elemen teratas Stack TANPA menghapus adalah?',c:'',o:['pop','peek/top','push','dequeue'],a:1,e:'peek/top mengembalikan elemen teratas tanpa mengeluarkannya.'},
{t:'stackqueue',l:'Menengah',q:'Struktur data tepat untuk memeriksa pasangan kurung seimbang adalah?',c:'',o:['Queue','Stack','Heap','Hash Table'],a:1,e:'Kurung buka di-push; saat kurung tutup, pop dan cocokkan (LIFO).'},
{t:'stackqueue',l:'Menengah',q:'Kondisi "stack underflow" terjadi ketika?',c:'',o:['Push pada stack penuh','Pop pada stack kosong','Stack setengah penuh','Peek elemen tengah'],a:1,e:'Underflow = pop/peek saat kosong. Overflow = push saat penuh.'},
{t:'stackqueue',l:'Lanjut',q:'Agar getMin() pada stack berjalan O(1), teknik yang dipakai?',c:'',o:['Stack bantu yang melacak minimum','Mengurutkan stack tiap push','Memakai queue','Pencarian linear tiap kali'],a:0,e:'Stack bantu menyimpan minimum berjalan => push/pop/getMin semua O(1).'},
{t:'stackqueue',l:'Menengah',q:'Struktur data yang mengizinkan tambah/hapus di KEDUA ujung adalah?',c:'',o:['Deque','Stack','Priority Queue','BST'],a:0,e:'Deque mendukung insert/remove di depan maupun belakang.'},
{t:'linkedlist',l:'Dasar',q:'Node pada singly linked list menyimpan?',c:'',o:['Data dan pointer ke node berikutnya','Hanya data','Data dan dua pointer','Indeks numerik'],a:0,e:'Node singly linked list berisi data + pointer next.'},
{t:'linkedlist',l:'Dasar',q:'Keunggulan linked list dibanding array adalah?',c:'',o:['Ukuran dinamis dan sisip/hapus efisien','Akses indeks O(1)','Hemat memori per elemen','Memori kontigu'],a:0,e:'Linked list dinamis dan sisip/hapus di posisi diketahui bisa O(1).'},

{t:'linkedlist',l:'Lanjut',q:'Diberi hanya pointer ke node tengah (bukan terakhir), menghapusnya bisa?',c:'',o:['Salin data node berikut lalu lewati, O(1)','Telusuri dari head, O(n)','Tidak mungkin','Balik list dulu'],a:0,e:'Salin data node berikutnya ke node ini lalu sambung ke node->next->next => O(1).'},
{t:'linkedlist',l:'Dasar',q:'Node pada doubly linked list menyimpan?',c:'',o:['Hanya data','Data + satu pointer','Data + pointer prev dan next','Hanya pointer'],a:2,e:'Doubly linked list menyimpan data plus dua pointer (prev dan next).'},

{t:'linkedlist',l:'Dasar',q:'Pada circular linked list, next node terakhir menunjuk ke?',c:'',o:['NULL','Node pertama (head)','Dirinya sendiri','Node tengah'],a:1,e:'Node terakhir menunjuk kembali ke head, membentuk lingkaran.'},

var pool=[],idx=0,score=0,answered=false,perLevel={},currentKey='all';
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return arr;}
function topicName(k){for(var i=0;i<TOPICS.length;i++){if(TOPICS[i][0]===k)return TOPICS[i][1];}return k;}
function show(id){['home','quiz','results'].forEach(function(s){document.getElementById(s).classList.add('hidden');});document.getElementById(id).classList.remove('hidden');window.scrollTo(0,0);}
function goHome(){show('home');}
function renderHome(){var g=document.getElementById('topicGrid');g.innerHTML='';var all=document.createElement('button');all.className='topic-btn all';all.innerHTML='Semua Topik<small>Campuran acak ('+QUESTIONS.length+' soal)</small>';all.onclick=function(){start('all');};g.appendChild(all);TOPICS.forEach(function(pair){var k=pair[0],name=pair[1];var n=QUESTIONS.filter(function(q){return q.t===k;}).length;var b=document.createElement('button');b.className='topic-btn';var lab=document.createElement('span');lab.textContent=name;var sm=document.createElement('small');sm.textContent=n+' soal';b.appendChild(lab);b.appendChild(sm);b.onclick=function(){start(k);};g.appendChild(b);});}
function start(key){currentKey=key;pool=QUESTIONS.filter(function(q){return key==='all'||q.t===key;}).slice();shuffle(pool);idx=0;score=0;perLevel={Dasar:{c:0,t:0},Menengah:{c:0,t:0},Lanjut:{c:0,t:0}};show('quiz');renderQ();}
function renderQ(){answered=false;var q=pool[idx];document.getElementById('bar').style.width=(idx/pool.length*100)+'%';document.getElementById('counter').textContent='Soal '+(idx+1)+' dari '+pool.length;document.getElementById('score').textContent='Skor: '+score+'/'+pool.length;document.getElementById('qtopic').textContent=topicName(q.t);var lv=document.getElementById('qlevel');lv.textContent=q.l;lv.className='badge b-'+q.l;document.getElementById('qtext').textContent=q.q;var codeBox=document.getElementById('qcode');codeBox.innerHTML='';if(q.c){var pre=document.createElement('pre');var code=document.createElement('code');code.className='language-c';code.textContent=q.c;pre.appendChild(code);codeBox.appendChild(pre);if(window.hljs){try{hljs.highlightElement(code);}catch(e){}}}var opts=document.getElementById('opts');opts.innerHTML='';q.o.forEach(function(text,i){var btn=document.createElement('button');btn.className='opt';var key=document.createElement('span');key.className='key';key.textContent=String.fromCharCode(65+i)+'.';btn.appendChild(key);btn.appendChild(document.createTextNode(text));btn.onclick=(function(ix,el){return function(){choose(ix,el);};})(i,btn);opts.appendChild(btn);});document.getElementById('explainBox').innerHTML='';document.getElementById('nextWrap').innerHTML='';}
function choose(i,btn){if(answered)return;answered=true;var q=pool[idx];perLevel[q.l].t++;var buttons=document.querySelectorAll('#opts .opt');for(var bi=0;bi<buttons.length;bi++){buttons[bi].disabled=true;if(bi===q.a)buttons[bi].classList.add('correct');}if(i===q.a){score++;perLevel[q.l].c++;}else{btn.classList.add('wrong');}document.getElementById('score').textContent='Skor: '+score+'/'+pool.length;var ex=document.getElementById('explainBox');var d=document.createElement('div');d.className='explain';var b=document.createElement('b');b.textContent=(i===q.a?'Benar! ':'Kurang tepat. ');d.appendChild(b);d.appendChild(document.createTextNode(q.e));ex.appendChild(d);var nw=document.getElementById('nextWrap');var nb=document.createElement('button');nb.className='btn';nb.textContent=(idx+1<pool.length)?'Soal Selanjutnya':'Lihat Hasil';nb.onclick=next;nw.appendChild(nb);}
function next(){idx++;if(idx>=pool.length){showResults();}else{renderQ();}}
function verdict(p){if(p>=85)return ' - Luar biasa!';if(p>=70)return ' - Bagus!';if(p>=50)return ' - Cukup, terus berlatih.';return ' - Perlu lebih banyak latihan.';}
function showResults(){show('results');var pct=Math.round(score/pool.length*100);document.getElementById('rScore').textContent=score+' / '+pool.length;document.getElementById('rPct').textContent='Persentase: '+pct+'%'+verdict(pct);var tb=document.getElementById('rBreak');tb.innerHTML='';['Dasar','Menengah','Lanjut'].forEach(function(lvl){var o=perLevel[lvl];var pc=o.t?Math.round(o.c/o.t*100):0;var tr=document.createElement('tr');tr.innerHTML='<td>'+lvl+'</td><td>'+o.c+'</td><td>'+o.t+'</td><td>'+pc+'%</td>';tb.appendChild(tr);});document.getElementById('bar').style.width='100%';}
renderHome();
</script>
