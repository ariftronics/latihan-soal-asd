<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Algoritma & Struktur Data</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;margin:0;background:#f1f5f9;color:#1e293b;line-height:1.6}
header{background:linear-gradient(135deg,#6366f1,#0ea5e9);color:#fff;padding:30px 16px;text-align:center}
header h1{margin:0;font-size:1.45rem}
header p{margin:6px 0 0;opacity:.92;font-size:.9rem}
.container{max-width:760px;margin:0 auto;padding:20px 16px 70px}
.card{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(15,23,42,.08);padding:22px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
h2{margin:0 0 6px;font-size:1.2rem}
.sub{color:#64748b;font-size:.9rem;margin:0 0 8px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
.topic-btn{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 12px;cursor:pointer;font-size:.92rem;font-weight:600;color:#334155;transition:.2s;text-align:center}
.topic-btn:hover{border-color:#6366f1;transform:translateY(-2px);box-shadow:0 6px 14px rgba(99,102,241,.15)}
.topic-btn small{display:block;font-weight:500;color:#94a3b8;margin-top:4px}
.topic-btn.all{grid-column:1/-1;background:linear-gradient(135deg,#6366f1,#0ea5e9);color:#fff;border:none}
.topic-btn.all small{color:#e0e7ff}
.meta{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:#64748b;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.meta .score{font-weight:700;color:#6366f1}
.badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px}
.b-Dasar{background:#dcfce7;color:#166534}.b-Menengah{background:#fef9c3;color:#854d0e}.b-Lanjut{background:#fee2e2;color:#991b1b}
.progress{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-bottom:16px}
.progress>div{height:100%;width:0;background:linear-gradient(90deg,#6366f1,#0ea5e9);transition:width .3s}
.qtext{font-size:1.05rem;font-weight:600;margin:6px 0 14px}
pre{background:#282c34;color:#e2e8f0;padding:0;border-radius:10px;overflow:auto;margin:0 0 14px}
pre code{font-family:Consolas,Menlo,monospace;font-size:.85rem;display:block;padding:14px}
.opt{display:flex;align-items:flex-start;width:100%;text-align:left;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:10px;cursor:pointer;font-size:.95rem;transition:.15s;color:#1e293b}
.opt:hover:not(:disabled){border-color:#6366f1;background:#eef2ff}
.opt:disabled{cursor:default}
.opt .key{font-weight:700;margin-right:10px;color:#6366f1}
.opt.correct{background:#dcfce7;border-color:#22c55e;color:#166534}
.opt.correct .key{color:#16a34a}
.opt.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.opt.wrong .key{color:#dc2626}
.explain{background:#eff6ff;border-left:4px solid #3b82f6;border-radius:0 10px 10px 0;padding:12px 14px;margin-top:8px;font-size:.92rem;animation:fade .3s}
.explain b{color:#1e40af}
.btn{display:inline-block;background:#6366f1;color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s;margin-top:10px}
.btn:hover{background:#4f46e5}
.btn.secondary{background:#e2e8f0;color:#334155}
.btn.secondary:hover{background:#cbd5e1}
.result-score{font-size:2.4rem;font-weight:800;text-align:center;margin:8px 0 0}
.result-pct{text-align:center;color:#64748b;margin-bottom:10px}
.breakdown{width:100%;border-collapse:collapse;margin:14px 0}
.breakdown th,.breakdown td{border:1px solid #e2e8f0;padding:8px 10px;text-align:center;font-size:.9rem}
.breakdown th{background:#f1f5f9}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.hidden{display:none}
@media(max-width:520px){.qtext{font-size:1rem}.result-score{font-size:2rem}}
</style>
</head>
<body>
<header>
<h1>Latihan Soal Algoritma &amp; Struktur Data</h1>

<div class="container">

</div>
<div id="quiz" class="card hidden">

<div id="nextWrap"></div>
</div>

<div id="rPct" class="result-pct"></div>

<button class="btn" onclick="start(currentKey)">Ulangi Topik Ini</button>

</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
var TOPICS=[['bigo','Big-O Notation'],['array','Array'],['stackqueue','Stack & Queue'],['linkedlist','Linked List'],['sorting','Sorting'],['searching','Searching'],['recursion','Rekursi & D&C'],['tree','Tree & BST'],['heap','Heap'],['hashing','Hashing'],['graph','Graph (BFS/DFS)'],['hots','Soal HOTS']];
var QUESTIONS=[
{t:'bigo',l:'Dasar',q:'Notasi yang menyatakan batas atas (upper bound) pertumbuhan waktu eksekusi algoritma adalah?',c:'',o:['Big-O','Big-Omega','Big-Theta','Little-omega'],a:0,e:'Big-O menyatakan batas atas (worst case). Big-Omega batas bawah, Big-Theta batas ketat (atas dan bawah), little-omega batas bawah tidak ketat.'},
{t:'bigo',l:'Dasar',q:'Berapa kompleksitas waktu mengakses elemen array berdasarkan indeks?',c:'',o:['O(1)','O(n)','O(log n)','O(n log n)'],a:0,e:'Akses indeks dihitung langsung lewat alamat (base + i*size), jadi O(1). O(n) adalah penelusuran linear, bukan akses langsung.'},
{t:'bigo',l:'Menengah',q:'Berapa kompleksitas potongan kode berikut?',c:'for (int i = 1; i < n; i = i * 2)\n    x = x + i;',o:['O(log n)','O(n)','O(n log n)','O(n^2)'],a:0,e:'Variabel i digandakan tiap iterasi (1,2,4,8,...), sehingga jumlah iterasi log2(n) => O(log n). Akan O(n) jika i bertambah konstan.'},
{t:'bigo',l:'Menengah',q:'Berapa kompleksitas dua loop bersarang yang masing-masing berjalan n kali?',c:'for (i = 0; i < n; i++)\n  for (j = 0; j < n; j++)\n    op();',o:['O(n^2)','O(n)','O(2n)','O(n log n)'],a:0,e:'Loop dalam berjalan n kali untuk tiap iterasi loop luar (n kali) => n*n = O(n^2). O(2n) keliru karena ini bukan dua loop berurutan.'},
{t:'bigo',l:'Lanjut',q:'Dengan Master Theorem, solusi rekurens T(n) = 2T(n/2) + n adalah?',c:'',o:['O(n log n)','O(n)','O(n^2)','O(log n)'],a:0,e:'a=2, b=2, f(n)=n; n^(log_b a)=n. Karena f(n) sebanding dengan n^(log_b a) (Case 2), hasilnya O(n log n) - persis Merge Sort.'},
{t:'array',l:'Dasar',q:'Ciri utama array statis adalah?',c:'',o:['Ukuran tetap saat dideklarasikan','Ukuran bertambah otomatis','Elemen boleh beda tipe','Elemen tersebar acak di memori'],a:0,e:'Array statis berukuran tetap dan elemennya kontigu di memori. Penambahan otomatis adalah ciri dynamic array/list.'},
{t:'array',l:'Dasar',q:'Pada kebanyakan bahasa (C, Java), indeks pertama array adalah?',c:'',o:['0','1','-1','Tergantung panjang'],a:0,e:'Indeks array berbasis 0 sehingga elemen pertama A[0]. Inilah dasar rumus alamat base + i*size.'},
{t:'array',l:'Menengah',q:'Array int (4 byte) beralamat awal 1000. Berapa alamat A[5]?',c:'',o:['1020','1005','1024','1040'],a:0,e:'alamat = base + index*size = 1000 + 5*4 = 1020. Jawaban 1005 keliru karena mengabaikan ukuran elemen (4 byte).'},
{t:'array',l:'Menengah',q:'Berapa kompleksitas menyisipkan elemen di awal array (semua elemen digeser)?',c:'',o:['O(n)','O(1)','O(log n)','O(n^2)'],a:0,e:'Sisip di awal memaksa seluruh n elemen bergeser satu posisi => O(n). O(1) hanya untuk sisip di akhir (amortized pada dynamic array).'},
{t:'array',l:'Lanjut',q:'Memutar array sejauh k posisi dengan waktu O(n) dan memori tambahan O(1) memakai teknik?',c:'',o:['Tiga kali operasi reverse','Array bantu berukuran n','Sorting ulang','Rekursi penuh'],a:0,e:'Teknik 3x reverse (balik kiri, balik kanan, balik keseluruhan) memutar array dengan O(n) waktu dan O(1) memori. Array bantu butuh O(n) memori.'},
{t:'stackqueue',l:'Dasar',q:'Prinsip kerja Stack adalah?',c:'',o:['LIFO (Last In First Out)','FIFO (First In First Out)','Acak','Berdasarkan prioritas'],a:0,e:'Stack bersifat LIFO: elemen terakhir masuk keluar pertama. FIFO adalah Queue, prioritas adalah Priority Queue.'},
{t:'stackqueue',l:'Dasar',q:'Prinsip kerja Queue adalah?',c:'',o:['FIFO (First In First Out)','LIFO (Last In First Out)','Acak','Berdasarkan nilai'],a:0,e:'Queue bersifat FIFO: yang pertama masuk dilayani lebih dulu, seperti antrian. LIFO adalah Stack.'},
{t:'stackqueue',l:'Menengah',q:'Berapa hasil evaluasi ekspresi postfix: 5 1 2 + 4 * + 3 -',c:'',o:['14','13','17','11'],a:0,e:'1+2=3; 3*4=12; 5+12=17; 17-3=14. Postfix dievaluasi dengan stack: operand di-push, operator memproses dua operand teratas.'},
{t:'stackqueue',l:'Menengah',q:'Pada circular queue ukuran 5 dengan front=2 dan rear=0, berapa jumlah elemen?',c:'',o:['3','2','5','0'],a:0,e:'jumlah = (rear - front + size) % size = (0 - 2 + 5) % 5 = 3. Modulo menangani pembungkusan indeks (wrap-around).'},
{t:'stackqueue',l:'Lanjut',q:'Mengimplementasikan Queue dengan dua Stack memberi kompleksitas dequeue?',c:'',o:['O(1) amortized','O(n) selalu','O(log n)','O(n^2)'],a:0,e:'Tiap elemen dipindah dari stack-in ke stack-out paling banyak sekali => rata-rata O(1) amortized, meski satu operasi transfer bisa O(n).'},
{t:'linkedlist',l:'Dasar',q:'Sebuah node pada singly linked list menyimpan?',c:'',o:['Data dan pointer ke node berikutnya','Hanya data','Data dan dua pointer','Indeks numerik'],a:0,e:'Node singly linked list berisi data + pointer next. Dua pointer (prev dan next) adalah ciri doubly linked list.'},
{t:'linkedlist',l:'Dasar',q:'Keunggulan linked list dibanding array adalah?',c:'',o:['Ukuran dinamis dan sisip/hapus efisien','Akses indeks O(1)','Hemat memori per elemen','Lokasi memori kontigu'],a:0,e:'Linked list dinamis dan sisip/hapus di posisi diketahui bisa O(1). Akses indeks O(1) dan memori kontigu justru keunggulan array.'},
{t:'linkedlist',l:'Menengah',q:'Berapa kompleksitas membalik (reverse) singly linked list secara iteratif?',c:'',o:['O(n)','O(1)','O(log n)','O(n^2)'],a:0,e:'Reverse iteratif menelusuri tiap node sekali sambil membalik pointer => O(n) waktu, O(1) memori tambahan.'},
{t:'linkedlist',l:'Menengah',q:'Algoritma Floyd (tortoise & hare) untuk deteksi cycle memakai memori tambahan?',c:'',o:['O(1)','O(n)','O(log n)','O(n^2)'],a:0,e:'Floyd hanya memakai dua pointer (slow dan fast) => O(1) memori. Pendekatan hash set juga bisa tapi butuh O(n) memori.'},
{t:'linkedlist',l:'Lanjut',q:'Diberi hanya pointer ke sebuah node tengah (bukan terakhir), menghapusnya bisa dengan?',c:'',o:['Menyalin data node berikutnya lalu melewatinya, O(1)','Menelusuri dari head, O(n)','Tidak mungkin','Membalik list dulu'],a:0,e:'Salin data node berikutnya ke node ini lalu sambungkan ke node->next->next, menghapus dalam O(1) tanpa perlu tahu head.'},
{t:'sorting',l:'Dasar',q:'Algoritma sorting berikut yang TIDAK stabil adalah?',c:'',o:['Quick Sort','Merge Sort','Insertion Sort','Bubble Sort'],a:0,e:'Quick Sort (juga Selection, Heap) umumnya tidak stabil karena pertukaran jarak jauh mengubah urutan elemen bernilai sama. Merge/Insertion/Bubble stabil.'},
{t:'sorting',l:'Dasar',q:'Berapa best-case Bubble Sort yang dioptimasi (dengan flag) pada data sudah terurut?',c:'',o:['O(n)','O(n^2)','O(n log n)','O(1)'],a:0,e:'Dengan flag pendeteksi swap, satu kali lewat tanpa pertukaran cukup => best-case O(n). Tanpa optimasi tetap O(n^2).'},
{t:'sorting',l:'Menengah',q:'Berapa kompleksitas Merge Sort pada best, average, dan worst case?',c:'',o:['Selalu O(n log n)','O(n) sampai O(n^2)','O(n^2) selalu','O(log n)'],a:0,e:'Merge Sort selalu membagi dua (log n tingkat) dan menggabung O(n) per tingkat => O(n log n) di semua kasus. Kekurangannya butuh O(n) memori tambahan.'},
{t:'sorting',l:'Menengah',q:'Kapan Quick Sort mengalami worst case O(n^2)?',c:'',o:['Saat pemilihan pivot selalu buruk (mis. data terurut, pivot ujung)','Saat data acak','Saat n genap','Saat memakai rekursi'],a:0,e:'Pivot buruk menghasilkan partisi sangat timpang (1 vs n-1) berulang => O(n^2). Dihindari dengan pivot acak atau median-of-three.'},
{t:'sorting',l:'Lanjut',q:'Counting Sort memiliki kompleksitas dan sifat?',c:'',o:['O(n + k), non-comparison, stabil','O(n log n), comparison','O(n^2), tidak stabil','O(log n), comparison'],a:0,e:'Counting Sort menghitung frekuensi nilai (rentang k), berjalan O(n + k) tanpa membandingkan elemen, dan stabil. Efisien saat k kecil relatif terhadap n.'},
{t:'searching',l:'Dasar',q:'Syarat utama agar binary search dapat digunakan adalah?',c:'',o:['Data harus terurut','Data harus berupa angka','Data harus unik','Data harus di linked list'],a:0,e:'Binary search membagi ruang pencarian berdasarkan urutan, jadi data wajib terurut. Tidak harus unik atau angka selama bisa dibandingkan.'},
{t:'searching',l:'Dasar',q:'Berapa kompleksitas worst-case linear search pada n elemen?',c:'',o:['O(n)','O(log n)','O(1)','O(n^2)'],a:0,e:'Linear search memeriksa elemen satu per satu; worst case memeriksa semua n elemen => O(n). O(log n) adalah binary search.'},
{t:'searching',l:'Menengah',q:'Berapa maksimum perbandingan binary search pada 1000 elemen?',c:'',o:['10','100','500','20'],a:0,e:'Maksimum = ceil(log2(1000)) = 10, karena tiap langkah memangkas ruang pencarian setengah (2^10 = 1024 > 1000).'},
{t:'searching',l:'Menengah',q:'Untuk menemukan kemunculan PERTAMA nilai pada array terurut berduplikat, binary search dimodifikasi dengan?',c:'',o:['Setelah ketemu, terus mencari ke kiri','Berhenti di kemunculan pertama yang ditemukan','Mencari ke kanan','Memakai linear search'],a:0,e:'Saat target ditemukan, simpan indeks lalu lanjut ke kiri (high = mid-1) untuk indeks lebih kecil. Tetap O(log n).'},
{t:'searching',l:'Lanjut',q:'Pada data terurut terdistribusi merata, Interpolation Search memiliki kompleksitas rata-rata?',c:'',o:['O(log log n)','O(log n)','O(n)','O(1)'],a:0,e:'Interpolation Search menebak posisi berdasarkan nilai; pada distribusi merata rata-rata O(log log n), namun worst case bisa O(n) bila distribusi timpang.'},
{t:'recursion',l:'Dasar',q:'Komponen yang WAJIB ada agar rekursi tidak berjalan tak terhingga adalah?',c:'',o:['Base case (kondisi berhenti)','Loop','Array global','Variabel statis'],a:0,e:'Base case menghentikan rekursi. Tanpa base case yang tercapai, fungsi terus memanggil diri sendiri hingga stack overflow.'},
{t:'recursion',l:'Dasar',q:'Berapa langkah minimum Tower of Hanoi untuk 4 cakram?',c:'',o:['15','16','8','7'],a:0,e:'Rumus 2^n - 1 = 2^4 - 1 = 15. Menunjukkan pertumbuhan eksponensial jumlah langkah terhadap jumlah cakram.'},
{t:'recursion',l:'Menengah',q:'Berapa kompleksitas Fibonacci rekursif naif (tanpa memoization)?',c:'int fib(int n) {\n  if (n < 2) return n;\n  return fib(n-1) + fib(n-2);\n}',o:['O(2^n)','O(n)','O(n^2)','O(log n)'],a:0,e:'Tiap panggilan bercabang dua tanpa menyimpan hasil => pohon panggilan eksponensial O(2^n). Dengan memoization turun jadi O(n).'},
{t:'recursion',l:'Menengah',q:'Tiga tahap strategi Divide and Conquer adalah?',c:'',o:['Divide, Conquer, Combine','Sort, Search, Merge','Push, Pop, Peek','Map, Filter, Reduce'],a:0,e:'D&C: Divide (bagi masalah), Conquer (selesaikan sub-masalah rekursif), Combine (gabungkan hasil). Contoh: Merge Sort.'},
{t:'recursion',l:'Lanjut',q:'Rekurens T(n) = T(n/2) + O(1) menghasilkan kompleksitas?',c:'',o:['O(log n)','O(n)','O(n log n)','O(1)'],a:0,e:'Tiap langkah memangkas input setengah dengan kerja konstan => log n langkah => O(log n). Ini rekurens Binary Search.'},
{t:'tree',l:'Dasar',q:'Properti Binary Search Tree (BST) yang benar adalah?',c:'',o:['Subtree kiri < node < subtree kanan','Subtree kiri > node','Semua anak lebih besar','Tidak ada aturan urutan'],a:0,e:'Pada BST, semua nilai subtree kiri lebih kecil dan subtree kanan lebih besar dari node. Properti ini memungkinkan pencarian O(log n) saat seimbang.'},
{t:'tree',l:'Dasar',q:'Traversal apa pada BST yang menghasilkan data terurut menaik?',c:'',o:['Inorder','Preorder','Postorder','Level-order'],a:0,e:'Inorder (Left, Root, Right) mengunjungi nilai dari terkecil ke terbesar pada BST. Preorder/Postorder tidak menghasilkan urutan terurut.'},
{t:'tree',l:'Menengah',q:'Akar A; anak B (kiri) dan C (kanan); B beranak D (kiri), E (kanan). Hasil Preorder?',c:'',o:['A B D E C','D B E A C','A B C D E','D E B C A'],a:0,e:'Preorder = Root, Left, Right => A, lalu subtree B (B, D, E), lalu C => A B D E C. Inorder akan menghasilkan D B E A C.'},
{t:'tree',l:'Menengah',q:'Jumlah maksimum node pada pohon biner dengan tinggi h (akar tinggi 0) adalah?',c:'',o:['2^(h+1) - 1','2^h','h^2','2h + 1'],a:0,e:'Pohon biner penuh tinggi h punya 2^(h+1) - 1 node (mis. h=3 => 15). Tiap level i memuat maksimal 2^i node.'},
{t:'tree',l:'Lanjut',q:'Mengapa pencarian pada BST bisa memburuk menjadi O(n)?',c:'',o:['Jika BST timpang/skewed seperti rantai (data tersisip terurut)','Jika BST seimbang','Jika node terlalu sedikit','Jika memakai rekursi'],a:0,e:'Menyisipkan data yang sudah terurut membuat BST menyerupai linked list (tinggi n) => pencarian O(n). Pohon seimbang (AVL/Red-Black) menjaga O(log n).'},
{t:'heap',l:'Dasar',q:'Pada min-heap, elemen di akar (root) adalah?',c:'',o:['Nilai terkecil','Nilai terbesar','Nilai tengah','Acak'],a:0,e:'Min-heap menjamin parent <= anak-anaknya, sehingga akar adalah nilai terkecil. Pada max-heap akar adalah terbesar.'},
{t:'heap',l:'Dasar',q:'Heap biner selalu berbentuk?',c:'',o:['Complete binary tree','Binary search tree','Pohon timpang','Graf siklik'],a:0,e:'Heap adalah complete binary tree (terisi kiri ke kanan tiap level), sehingga efisien direpresentasikan dengan array. Heap bukan BST.'},
{t:'heap',l:'Menengah',q:'Pada heap berbasis array (indeks mulai 0), indeks parent dari node indeks i adalah?',c:'',o:['(i-1)/2','2i+1','2i+2','i/2'],a:0,e:'Parent = floor((i-1)/2); anak kiri = 2i+1, anak kanan = 2i+2. Rumus ini memetakan struktur pohon ke array.'},
{t:'heap',l:'Menengah',q:'Berapa kompleksitas operasi extract-min (termasuk sift-down) pada heap?',c:'',o:['O(log n)','O(1)','O(n)','O(n log n)'],a:0,e:'Setelah memindah elemen terakhir ke akar, sift-down menukar ke bawah sepanjang tinggi pohon (log n) => O(log n). Melihat min saja (peek) O(1).'},
{t:'heap',l:'Lanjut',q:'Membangun heap dari n elemen dengan metode bottom-up (build-heap) berkompleksitas?',c:'',o:['O(n)','O(n log n)','O(log n)','O(n^2)'],a:0,e:'Meski naif terlihat O(n log n), analisis deret menunjukkan build-heap bottom-up hanya O(n) karena mayoritas node dekat daun (sift-down pendek).'},
{t:'hashing',l:'Dasar',q:'Kompleksitas rata-rata operasi search pada hash table adalah?',c:'',o:['O(1)','O(n)','O(log n)','O(n log n)'],a:0,e:'Dengan fungsi hash baik dan load factor terjaga, search rata-rata O(1). Worst case O(n) bila semua key berkolisi.'},
{t:'hashing',l:'Dasar',q:'Kolisi (collision) pada hash table terjadi ketika?',c:'',o:['Dua key berbeda menghasilkan indeks slot sama','Tabel penuh','Key berupa angka','Fungsi hash terlalu cepat'],a:0,e:'Kolisi = dua key berbeda dipetakan ke slot yang sama oleh fungsi hash. Ditangani dengan chaining atau open addressing.'},
{t:'hashing',l:'Menengah',q:'Dengan h(k) = k mod 10, key 27 disimpan di slot?',c:'',o:['7','2','27','17'],a:0,e:'27 mod 10 = 7. Operasi modulo memetakan key ke rentang indeks tabel 0..9.'},
{t:'hashing',l:'Menengah',q:'Perbedaan utama chaining dan open addressing (linear probing) adalah?',c:'',o:['Chaining simpan linked list per slot; probing cari slot kosong berikutnya','Keduanya identik','Chaining tidak menangani kolisi','Probing memakai pohon'],a:0,e:'Chaining menyimpan semua key sekolisi dalam linked list di slot; linear probing mencari slot kosong berikutnya secara berurutan (rawan clustering).'},
{t:'hashing',l:'Lanjut',q:'Kapan operasi hash table memburuk menjadi O(n)?',c:'',o:['Saat semua key berkolisi ke slot yang sama','Saat tabel kosong','Saat load factor 0','Saat key terurut'],a:0,e:'Fungsi hash buruk yang membuat semua key jatuh ke satu slot mengubah pencarian jadi penelusuran linear O(n). Karena itu fungsi hash baik dan rehashing penting.'},

{t:'graph',l:'Menengah',q:'Graf tak berarah: A-B, A-C, B-D, C-D, D-E. Urutan BFS dari A (tetangga urut abjad)?',c:'',o:['A B C D E','A B D C E','A C B E D','A D B C E'],a:0,e:'BFS memproses per level: A, lalu tetangga A (B, C), lalu tetangga mereka (D), lalu E => A B C D E. DFS akan memberi A B D C E.'},

var pool=[],idx=0,score=0,answered=false,perLevel={},currentKey='all';
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return arr;}
function topicName(k){for(var i=0;i<TOPICS.length;i++){if(TOPICS[i][0]===k)return TOPICS[i][1];}return k;}
function show(id){['home','quiz','results'].forEach(function(s){document.getElementById(s).classList.add('hidden');});document.getElementById(id).classList.remove('hidden');window.scrollTo(0,0);}
function goHome(){show('home');}
function renderHome(){var g=document.getElementById('topicGrid');g.innerHTML='';var all=document.createElement('button');all.className='topic-btn all';all.innerHTML='Semua Topik<small>Campuran acak ('+QUESTIONS.length+' soal)</small>';all.onclick=function(){start('all');};g.appendChild(all);TOPICS.forEach(function(pair){var k=pair[0],name=pair[1];var n=QUESTIONS.filter(function(q){return q.t===k;}).length;var b=document.createElement('button');b.className='topic-btn';var lab=document.createElement('span');lab.textContent=name;var sm=document.createElement('small');sm.textContent=n+' soal';b.appendChild(lab);b.appendChild(sm);b.onclick=function(){start(k);};g.appendChild(b);});}
function start(key){currentKey=key;pool=QUESTIONS.filter(function(q){return key==='all'||q.t===key;}).slice();shuffle(pool);idx=0;score=0;perLevel={Dasar:{c:0,t:0},Menengah:{c:0,t:0},Lanjut:{c:0,t:0}};show('quiz');renderQ();}
function renderQ(){answered=false;var q=pool[idx];document.getElementById('bar').style.width=(idx/pool.length*100)+'%';document.getElementById('counter').textContent='Soal '+(idx+1)+' dari '+pool.length;document.getElementById('score').textContent='Skor: '+score+'/'+pool.length;document.getElementById('qtopic').textContent=topicName(q.t);var lv=document.getElementById('qlevel');lv.textContent=q.l;lv.className='badge b-'+q.l;document.getElementById('qtext').textContent=q.q;var codeBox=document.getElementById('qcode');codeBox.innerHTML='';if(q.c){var pre=document.createElement('pre');var code=document.createElement('code');code.className='language-c';code.textContent=q.c;pre.appendChild(code);codeBox.appendChild(pre);if(window.hljs){try{hljs.highlightElement(code);}catch(e){}}}var opts=document.getElementById('opts');opts.innerHTML='';q.o.forEach(function(text,i){var btn=document.createElement('button');btn.className='opt';var key=document.createElement('span');key.className='key';key.textContent=String.fromCharCode(65+i)+'.';btn.appendChild(key);btn.appendChild(document.createTextNode(text));btn.onclick=(function(ix,el){return function(){choose(ix,el);};})(i,btn);opts.appendChild(btn);});document.getElementById('explainBox').innerHTML='';document.getElementById('nextWrap').innerHTML='';}
function choose(i,btn){if(answered)return;answered=true;var q=pool[idx];perLevel[q.l].t++;var buttons=document.querySelectorAll('#opts .opt');for(var bi=0;bi<buttons.length;bi++){buttons[bi].disabled=true;if(bi===q.a)buttons[bi].classList.add('correct');}if(i===q.a){score++;perLevel[q.l].c++;}else{btn.classList.add('wrong');}document.getElementById('score').textContent='Skor: '+score+'/'+pool.length;var ex=document.getElementById('explainBox');var d=document.createElement('div');d.className='explain';var b=document.createElement('b');b.textContent=(i===q.a?'Benar! ':'Kurang tepat. ');d.appendChild(b);d.appendChild(document.createTextNode(q.e));ex.appendChild(d);var nw=document.getElementById('nextWrap');var nb=document.createElement('button');nb.className='btn';nb.textContent=(idx+1<pool.length)?'Soal Selanjutnya':'Lihat Hasil';nb.onclick=next;nw.appendChild(nb);}
function next(){idx++;if(idx>=pool.length){showResults();}else{renderQ();}}
function verdict(p){if(p>=85)return ' - Luar biasa!';if(p>=70)return ' - Bagus!';if(p>=50)return ' - Cukup, terus berlatih.';return ' - Perlu lebih banyak latihan.';}
function showResults(){show('results');var pct=Math.round(score/pool.length*100);document.getElementById('rScore').textContent=score+' / '+pool.length;document.getElementById('rPct').textContent='Persentase: '+pct+'%'+verdict(pct);var tb=document.getElementById('rBreak');tb.innerHTML='';['Dasar','Menengah','Lanjut'].forEach(function(lvl){var o=perLevel[lvl];var pc=o.t?Math.round(o.c/o.t*100):0;var tr=document.createElement('tr');tr.innerHTML='<td>'+lvl+'</td><td>'+o.c+'</td><td>'+o.t+'</td><td>'+pc+'%</td>';tb.appendChild(tr);});document.getElementById('bar').style.width='100%';}
renderHome();
</script>
